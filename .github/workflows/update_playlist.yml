name: Playlist ve Script Güncelle

on:
  schedule:
    - cron: '*/15 * * * *' # 15 dakikada bir otomatik çalışır
  workflow_dispatch: # Elinle başlatman için buton açar

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Depoya geri yazma izni

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: yt-dlp Kur
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      # 1. Klasörleri önceden terminale zorla açtırıyoruz
      - name: Klasörleri Otomatik Oluştur
        run: |
          mkdir -p streams
          mkdir -p lists

      # 2. Python sadece YouTube linklerini çözer ve terminalin okuyabileceği bir dosyaya yazar
      - name: YouTube Canlı Yayın Linklerini Çöz
        run: |
          cat << 'EOF' > generate.py
          import subprocess

          kanallar = [
              ("TRT_Haber", "TRT Haber", "https://www.youtube.com/@trthaber/live"),
              ("Cnn_Turk", "CNN Türk", "https://www.youtube.com/@cnnturk/live"),
              ("NTV", "NTV", "https://www.youtube.com/@ntv/live"),
              ("A_haber", "A Haber", "https://www.youtube.com/@Ahaber/live"),
              ("Haber_Turk", "Haber Türk", "https://www.youtube.com/@haberturktv/live"),
              ("Halk_Tv", "Halk TV", "https://www.youtube.com/@Halktvkanali/live"),
              ("Sozcu_Tv", "Sözcü TV", "https://www.youtube.com/@sozcutelevizyonu/live"),
              ("TGRT_Haber", "TGRT Haber", "https://www.youtube.com/@tgrthaber/live"),
              ("Tgrt_Belgesel", "TGRT Belgesel", "https://www.youtube.com/@tgrtbelgeseltv/live"),
              ("Tgrt_Eu", "TGRT EU", "https://www.youtube.com/@tgrteutv/live"),
              ("Flash_Haber", "Flash Haber", "https://www.youtube.com/@FlashHaberTV/live"),
              ("Haber_Global_TV", "Haber Global", "https://www.youtube.com/@haberglobal/live"),
              ("TV_100", "TV 100", "https://www.youtube.com/@tv100/live"),
              ("Bloomberg_Ht", "Bloomberg HT", "https://www.youtube.com/@bloomberght/live"),
              ("Benguturk_Tv", "Bengü Türk", "https://www.youtube.com/@tvbenguturk/live"),
              ("Krt_Tv", "KRT TV", "https://www.youtube.com/@krtcanli/live"),
              ("Ulusal_Kanal", "Ulusal Kanal", "https://www.youtube.com/@ulusalkanalTV/live"),
              ("Ulke_Tv", "Ülke TV", "https://www.youtube.com/@ulketv/live"),
              ("Akit_Tv", "Akit TV", "https://www.youtube.com/@akittv/live"),
              ("Eko_Turk", "Eko Türk", "https://www.youtube.com/@ekoturktv/live"),
              ("24_Tv", "24 TV", "https://www.youtube.com/@YirmidortTV/live"),
              ("A_Spor", "A Spor", "https://www.youtube.com/@aspor/live"),
              ("Ht_Spor", "HT Spor", "https://www.youtube.com/@htspor/live"),
              ("Tv_Net", "TV Net", "https://www.youtube.com/@tvnet/live"),
              ("Bein_Spor_Haber", "Bein Spor Haber", "https://www.youtube.com/@beINSPORTST%C3%BCrkiye/live"),
              ("Bizim_Ev_Tv", "Bizimev TV", "https://www.youtube.com/@bizimevtv2000/live"),
              ("CNBC_E", "CNBC-e", "https://www.youtube.com/@cnbce/live"),
              ("Diyanet_Cocuk", "Diyanet Çocuk", "https://www.youtube.com/@DiyanetCocuk/live"),
              ("Kemal_Sunal_Tv", "Kemal Sunal TV", "https://www.youtube.com/@GulsahFilmOfficial/live")
          ]

          # Geçici bir metin dosyasına ham sonuçları yazıyoruz
          with open("raw_links.txt", "w", encoding="utf-8") as f:
              for slug, isim, url in kanallar:
                  result = subprocess.run(
                      ["yt-dlp", "--extractor-args", "youtube:player-client=android,web_embedded", "--no-check-certificates", "-f", "best", "-g", url],
                      capture_output=True, text=True
                  )
                  link = result.stdout.strip()
                  if link and link.startswith("http"):
                      f.write(f"{slug}|{isim}|{link}\n")
          EOF
          python generate.py

      # 3. Tam olarak senin istediğin yöntem: Terminal, gelen linklerle dosyaları çatır çatır oluşturur
       Bocası Otomatik Yazma Adımı
      - name: Tekil Kanalları ve Ana Listeyi Otomatik Oluştur/Güncelle
        run: |
          # Ana M3U dosyasının başlangıcını yazıyoruz
          echo "#EXTM3U" > lists/playlist.m3u
          
          # Satır satır çözülen linkleri okuyup dosyaları oluşturuyoruz
          while IFS="|" read -r slug isim link; do
            if [ -n "$link" ]; then
              
              # Tam senin yazdığın cat << 'EOF' mantığıyla terminale yazdırıyoruz:
              cat << EOF > "streams/${slug}.m3u8"
          #EXTM3U
          #EXT-X-VERSION:3
          #EXT-X-STREAM-INF:BANDWIDTH=1280000,RESOLUTION=1280x720
          ${link}
          EOF
              
              # Ana listenin (playlist.m3u) içine de ekleme yapıyoruz
              echo "#EXTINF:-1,${isim}" >> lists/playlist.m3u
              echo "streams/${slug}.m3u8" >> lists/playlist.m3u
              echo "✅ ${isim} terminal tarafından oluşturuldu."
            fi
          done < raw_links.txt

      # 4. Her şeyi depoya pushlama
      - name: Değişiklikleri Kaydet ve Gönder (Push)
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # raw_links ve geçici scripti temizleyelim depon kalabalık gözükmesin
          rm -f raw_links.txt get_links.py
          
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Terminal ile streams/ ve lists/ klasörleri güncellendi [skip ci]" && git push)
