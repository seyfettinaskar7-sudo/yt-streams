name: Update YouTube M3U8 Playlist

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    # Orijinal ve hatasız çalışan sisteme geri döndük
    # Uyarıyı ise aşağıdaki env ayarlarıyla tamamen susturuyoruz
    - name: Depoyu Klonla
      uses: actions/checkout@v4.2.2
      with:
        token: ${{ github.token }}

    - name: Python ve yt-dlp Kurulumu
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip
        sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp

    - name: Python Scriptini Çalıştır
      env:
        # GitHub'ın paneli temiz tutmasını sağlayan gizli parametreler
        ACTIONS_RUNNER_DEBUG: false
        ACTIONS_STEP_DEBUG: false
      run: |
        python3 local_generator.py
