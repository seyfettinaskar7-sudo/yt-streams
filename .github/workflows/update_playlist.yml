name: Update YouTube M3U8 Playlist

on:
  schedule:
    - cron: '0 */0.30 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    # Dependabot sadece buradaki '@v4' kısmını otomatik olarak '@v5' (veya en güncel sürüm) yapar.
    - name: Depoyu Klonla
      uses: actions/checkout@v5
      with:
        token: ${{ github.token }}

    - name: Python ve yt-dlp Kurulumu
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip
        sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp

    - name: Python Scriptini Çalıştır
      env:
        ACTIONS_RUNNER_DEBUG: false
        ACTIONS_STEP_DEBUG: false
      run: |
        python3 generate.py
