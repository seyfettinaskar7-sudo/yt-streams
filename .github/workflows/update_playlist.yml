name: Playlist Güncelle

on:
  schedule:
    - cron: '*/15 * * * *' # Her 15 dakikada bir otomatik çalışır
  workflow_dispatch: # Elle başlatma butonu

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Botun kod yükleyebilmesi için şart

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: yt-dlp Kur
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Canlı Yayınları Topla ve Git'e Yükle
        run: python generate.py # Python dosyanın adı neyse onu yaz
