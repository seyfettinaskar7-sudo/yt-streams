name: Update YouTube M3U8 Playlist

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    # Hata buradaydı, 'runs-ok' yerine doğrusu olan 'runs-on' olarak düzelttik
    runs-on: ubuntu-latest

    steps:
    # Depoyu Node.js kullanmadan, saf Git ile klonluyoruz (Sıfır Uyarı!)
    - name: Depoyu Git ile Klonla
      run: |
        git clone https://github.com/${{ github.repository }}.git .
        git checkout ${{ github.ref_name }}

    - name: Python ve yt-dlp Kurulumu
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip
        sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp

    - name: Python Scriptini Çalıştır
      run: |
        python3 local_generator.py
