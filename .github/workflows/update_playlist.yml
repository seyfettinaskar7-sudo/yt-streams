name: Playlist Güncelle

on:
  schedule:
    - cron: '*/15 * * * *' # Her 15 dakikada bir otomatik çalışır
  workflow_dispatch: # Elle başlatma butonu

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Botun kod yükleyebilmesi için şart

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: yt-dlp Kur
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Canlı Yayınları Topla
        run: python generate.py

      - name: Değişiklikleri Bot ile Kaydet ve Pushla
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update m3u8 files [skip ci]" || echo "Değişiklik yok"
          git push
