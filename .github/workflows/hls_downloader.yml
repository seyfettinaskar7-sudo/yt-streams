name: HLS İndirici (Video Kaydedici)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'İndirilecek YouTube veya HLS Linki'
        required: true
        default: 'https://www.youtube.com/watch?v=9_pY795LmsA'
      kayit_suresi:
        description: 'Canlı yayınsa kaç saniye kaydedilsin? (Boş bırakılırsa tamamı iner)'
        required: false
        default: '20'

permissions:
  contents: write

jobs:
  download_video:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v7
      with:
        token: ${{ github.token }}

    - name: Python ve yt-dlp Kurulumu
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip ffmpeg
        sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp

    - name: Videoyu İndir / Kaydet
      run: |
        mkdir -p indirilenler
        cd indirilenler
        
        # Süre kontrolü için Linux shell komutunu düzelttik
        if [ -n "${{ github.event.inputs.kayit_suresi }}" ]; then
          yt-dlp --max-filesize 50m --download-sections "*00:00:00-${{ github.event.inputs.kayit_suresi }}" "${{ github.event.inputs.video_url }}" -o "kayit_%(title)s.%(ext)s" || true
        else
          yt-dlp --max-filesize 50m "${{ github.event.inputs.video_url }}" -o "video_%(title)s.%(ext)s" || true
        fi

    - name: İndirilen Videoyu Depoya Yükle
      env:
        ACTIONS_RUNNER_DEBUG: false
        ACTIONS_STEP_DEBUG: false
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add indirilenler/
        git commit -m "Yeni video indirildi: $(date +'%d-%m-%Y %H:%M')" || exit 0
        git push origin main
